name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, windsurf ]
  pull_request:
    branches: [ main, develop, windsurf ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: knowledgegraph_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      working-directory: ./backend
      run: |
        go mod download
        go install github.com/gordonklaus/ineffassign@latest
        go install github.com/kisielk/errcheck@latest
        go install honnef.co/go/tools/cmd/staticcheck@latest

    - name: Run alternative linters
      working-directory: ./backend
      run: |
        echo "Running alternative linters for Go 1.26.1 compatibility"
        
        # Check formatting
        echo "Checking go fmt..."
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Code is not formatted properly:"
          gofmt -s -l .
          exit 1
        fi
        
        # Run go vet
        echo "Running go vet..."
        go vet ./...
        
        # Run ineffassign
        echo "Running ineffassign..."
        ineffassign ./...
        
        # Run errcheck
        echo "Running errcheck..."
        errcheck ./...
        
        # Run staticcheck
        echo "Running staticcheck..."
        staticcheck ./...
        
        echo "All linters passed!"

    - name: Run unit tests
      working-directory: ./backend
      env:
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_DB: knowledgegraph_test
        POSTGRES_USER: testuser
        POSTGRES_PASSWORD: testpass
        REDIS_HOST: localhost
        REDIS_PORT: 6379
      run: |
        go test -v -race -coverprofile=coverage.out ./...
        go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.out
        flags: backend
        name: backend-coverage

    - name: Build backend
      working-directory: ./backend
      run: |
        go build -o bin/app ./cmd/server/main.go

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: knowledgegraph
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'

    - name: Setup pgvector extension
      run: |
        # Install pgvector extension in PostgreSQL
        docker exec $(docker ps -q -f ancestor=postgres:15) bash -c "apt-get update && apt-get install -y postgresql-15-pgvector || (apt-get install -y make gcc postgresql-server-dev-15 && cd /tmp && git clone --branch v0.5.1 https://github.com/pgvector/pgvector.git && cd pgvector && make && make install)"
        # Create extension in the database
        docker exec $(docker ps -q -f ancestor=postgres:15) psql -U postgres -d knowledgegraph -c "CREATE EXTENSION IF NOT EXISTS vector;"

    - name: Build and start backend
      working-directory: ./backend
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/knowledgegraph?sslmode=disable
        REDIS_URL: localhost:6379
        SERVER_PORT: 8080
        NLP_SERVICE_URL: http://localhost:5000
      run: |
        go mod download
        go build -o bin/app ./cmd/server/main.go
        ./bin/app &
        sleep 10
        # Verify backend is running
        timeout 60 bash -c 'until curl -f http://localhost:8080/health; do sleep 2; done'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm install --legacy-peer-deps

    - name: Run type check
      working-directory: ./frontend
      run: npm run check

    - name: Run linting
      working-directory: ./frontend
      run: npm run lint

    - name: Install Playwright browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      working-directory: ./frontend
      run: npx playwright test --config=playwright.config.ts

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30

  nlp-tests:
    name: NLP Service Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('nlp-service/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      working-directory: ./nlp-service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock

    - name: Download NLTK data
      working-directory: ./nlp-service
      run: |
        python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords')"

    - name: Run unit tests
      working-directory: ./nlp-service
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=html

    - name: Run API tests
      working-directory: ./nlp-service
      run: |
        pytest tests/test_api.py -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./nlp-service/coverage.xml
        flags: nlp
        name: nlp-coverage

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: nlp-test-results
        path: nlp-service/htmlcov/
        retention-days: 30

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, nlp-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and start all services
      run: |
        docker compose -f docker-compose.yml build nlp
        docker compose -f docker-compose.yml up -d
        echo "Services starting..."

    - name: Wait for services to be ready
      run: |
        timeout 120 bash -c 'until curl -f http://localhost:5000/health 2>/dev/null; do echo "Waiting for NLP..."; sleep 5; done'
        echo "NLP ready!"
        timeout 120 bash -c 'until curl -f http://localhost:8080/health 2>/dev/null; do echo "Waiting for backend..."; sleep 5; done'
        echo "Backend ready!"

    - name: Run integration tests
      run: |
        cd frontend
        npx playwright test --config=playwright.config.ts --project=chromium

    - name: Stop services
      if: always()
      run: docker compose down

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Go security checks
      working-directory: ./backend
      run: |
        # Use go vet for security scanning instead of gosec
        go vet ./...
        echo "Go security checks passed"

    - name: Run npm audit
      working-directory: ./frontend
      run: npm audit --audit-level high --omit=dev

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, nlp-tests, integration-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/knowledge-graph-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/knowledge-graph-backend:${{ github.sha }}

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/knowledge-graph-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/knowledge-graph-frontend:${{ github.sha }}

    - name: Build and push NLP service image
      uses: docker/build-push-action@v5
      with:
        context: ./nlp-service
        file: ./nlp-service/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/knowledge-graph-nlp:latest
          ${{ secrets.DOCKER_USERNAME }}/knowledge-graph-nlp:${{ github.sha }}
