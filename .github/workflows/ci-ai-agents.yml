name: CI/CD for AI Agents

on:
  push:
    branches:
      - ai-agents
  pull_request:
    branches:
      - ai-agents

jobs:
  lint-backend:
    name: Lint Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ./backend
          version: latest
          args: --path-prefix=. --timeout=5m

  test-backend:
    name: Test Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.out
          flags: backend

  lint-frontend:
    name: Lint Frontend (Svelte)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Clean ESLint cache
        run: rm -f .eslintcache
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Check TypeScript
        run: npm run check

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kg_user
          POSTGRES_PASSWORD: kg_password
          POSTGRES_DB: knowledge_graph
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test:unit
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Apply database migrations
        env:
          DATABASE_URL: postgres://kg_user:kg_password@localhost:5432/knowledge_graph?sslmode=disable
        run: |
          # Install golang-migrate
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/
          
          # Apply migrations
          migrate -path ../backend/migrations -database "$DATABASE_URL" up
      
      - name: Start backend for BDD tests
        env:
          DATABASE_URL: postgres://kg_user:kg_password@localhost:5432/knowledge_graph?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          cd ../backend
          go mod download
          go run cmd/server/main.go &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"
          
          # Wait for backend to be ready
          for i in {1..30}; do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ Backend is ready!"
              break
            fi
            echo "Waiting for backend... attempt $i/30"
            sleep 2
          done
          
          # Verify backend is still running
          if ! kill -0 $BACKEND_PID 2>/dev/null; then
            echo "::error::Backend process died!"
            exit 1
          fi
      
      - name: Start frontend dev server
        run: |
          npm run dev &
          FRONTEND_PID=$!
          echo "Frontend PID: $FRONTEND_PID"
          
          # Wait for frontend to be ready
          for i in {1..30}; do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Frontend is ready!"
              break
            fi
            echo "Waiting for frontend... attempt $i/30"
            sleep 2
          done
          
          # Verify frontend is still running
          if ! kill -0 $FRONTEND_PID 2>/dev/null; then
            echo "::error::Frontend process died!"
            exit 1
          fi
      
      - name: Run BDD tests
        run: npm run test:bdd
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 5

  test-nlp:
    name: Test NLP Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nlp-service
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Check requirements exist
        run: test -f requirements.txt || (echo "requirements.txt not found" && exit 1)
      
      - name: Run tests
        run: pytest tests/ -v

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, lint-frontend, test-frontend, test-nlp]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image
        run: docker build -t knowledge-graph-backend ./backend
      
      - name: Build frontend image
        run: docker build -t knowledge-graph-frontend ./frontend
      
      - name: Build NLP service image
        run: docker build -t knowledge-graph-nlp ./nlp-service
      
      - name: Test docker-compose
        run: docker compose config || docker-compose config
