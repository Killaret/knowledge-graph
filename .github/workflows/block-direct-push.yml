name: Block Direct Push to Protected Branches

on:
  push:
    branches:
      - main
      - ai-agents

jobs:
  block-direct-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check if push is from PR merge
        run: |
          # Check if this is a PR merge by looking at the commit message
          if [[ "${{ github.event.head_commit.message }}" =~ ^Merge[[:space:]]pull[[:space:]]request[[:space:]]#[0-9]+ ]]; then
            echo "✅ This is a PR merge commit. Allowed."
            exit 0
          fi
          
          # Check if this is from GitHub Actions (CI merge)
          if [[ "${{ github.actor }}" == "github-actions[bot]" ]] || [[ "${{ github.actor }}" == "web-flow" ]]; then
            echo "✅ This is from GitHub automation. Allowed."
            exit 0
          fi
          
          # Block direct push
          echo "::error::❌ Direct push to ${{ github.ref_name }} is not allowed!"
          echo "::error::Please create a Pull Request to ${{ github.ref_name }} instead."
          exit 1
