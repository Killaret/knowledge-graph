name: Block Direct Push to Main

on:
  push:
    branches:
      - main

jobs:
  block-direct-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check if push is from PR merge
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          ACTOR="${{ github.actor }}"
          
          # Check for standard merge commit
          if [[ "$COMMIT_MSG" =~ ^Merge[[:space:]]pull[[:space:]]request[[:space:]]#[0-9]+ ]]; then
            echo "✅ Standard PR merge commit. Allowed."
            exit 0
          fi
          
          # Check for squash merge (contains "(#<number>)" in message)
          if [[ "$COMMIT_MSG" =~ \(#[0-9]+\)$ ]]; then
            echo "✅ Squash merge commit. Allowed."
            exit 0
          fi
          
          # Check for rebase merge (has multiple commits, check via GitHub API)
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          if [[ -n "$PR_NUMBER" ]]; then
            echo "✅ Rebase merge or PR-linked commit. Allowed."
            exit 0
          fi
          
          # Check if this is from GitHub automation (bots)
          BOT_USERS=("github-actions[bot]" "web-flow" "github-merge-queue[bot]" "dependabot[bot]" "renovate[bot]")
          for bot in "${BOT_USERS[@]}"; do
            if [[ "$ACTOR" == "$bot" ]]; then
              echo "✅ Push from authorized bot: $bot. Allowed."
              exit 0
            fi
          done
          
          # Block direct push
          echo "::error::❌ Direct push to main is not allowed!"
          echo "::error::Actor: $ACTOR"
          echo "::error::Commit: $COMMIT_MSG"
          echo "::error::Please create a Pull Request from your feature branch instead."
          echo ""
          echo "Workflow:"
          echo "1. git checkout -b feature/your-branch-name"
          echo "2. git add ."
          echo "3. git commit -m 'your message'"
          echo "4. git push origin feature/your-branch-name"
          echo "5. Create Pull Request on GitHub"
          exit 1
