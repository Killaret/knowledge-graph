name: Main Branch CI/CD

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============ BACKEND LINT & UNIT TESTS ============
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ./backend
          version: v1.56.0
          args: --path-prefix=. --timeout=10m
          skip-cache: false
          install-mode: binary

      - name: Run backend tests
        run: go test -v ./...

      - name: Validate config
        run: go run cmd/checkconfig/main.go ../knowledge-graph.config.json

  # ============ FRONTEND LINT & UNIT TESTS ============
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Clean ESLint cache
        run: rm -f .eslintcache

      - name: Run ESLint
        run: npm run lint

      - name: Check TypeScript
        run: npm run check

      - name: Run unit tests
        run: npm run test:unit

  # ============ NLP SERVICE TESTS ============
  nlp-checks:
    name: NLP Service Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nlp-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run NLP tests
        run: pytest tests/ -v

  # ============ CONFIG & MIGRATION VALIDATION ============
  config-validation:
    name: Config & Migration Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Validate JSON syntax
        run: |
          cat ../knowledge-graph.config.json | jq . > /dev/null
          echo "✓ JSON syntax valid"

      - name: Check config loads successfully
        run: |
          go mod download
          go run cmd/checkconfig/main.go ../knowledge-graph.config.json

      - name: Verify all env vars documented
        run: |
          grep -oP 'get[A-Za-z]+Env\("\K[^"]+' internal/config/config.go | sort | uniq > /tmp/env_vars_from_code.txt
          MISSING=0
          while read var; do
            if ! grep -qE "^#?$var=" ../.env.example 2>/dev/null; then
              echo "⚠️  $var not found in .env.example"
              MISSING=$((MISSING + 1))
            fi
          done < /tmp/env_vars_from_code.txt
          if [ $MISSING -eq 0 ]; then
            echo "✓ All environment variables documented"
          else
            echo "⚠️  $MISSING environment variables missing from .env.example"
            exit 1
          fi

  check-migrations:
    name: Check Migration Drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Check GORM AutoMigrate compatibility
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_db?sslmode=disable
        run: |
          go mod download
          go test -v ./internal/infrastructure/db/postgres -run TestAutoMigrate 2>&1 || true

  # ============ FULL TEST SUITE ============
  full-tests:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, nlp-checks, config-validation]
    defaults:
      run:
        working-directory: ./frontend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kb_user
          POSTGRES_PASSWORD: kb_password
          POSTGRES_DB: knowledge_base
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Apply database migrations
        env:
          DATABASE_URL: postgres://kb_user:kb_password@localhost:5432/knowledge_base?sslmode=disable
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/
          migrate -path ../backend/migrations -database "$DATABASE_URL" up

      - name: Start backend for E2E tests
        env:
          DATABASE_URL: postgres://kb_user:kb_password@localhost:5432/knowledge_base?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          cd ../backend
          go mod download
          go mod tidy
          go run cmd/server/main.go &
          for i in {1..30}; do
            if curl -s http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ Backend is ready!"
              break
            fi
            echo "Waiting for backend... attempt $i/30"
            sleep 2
          done

      - name: Run all Playwright tests
        run: npm test

      - name: Run all Cucumber tests
        run: npm run test:cucumber

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-results
          path: frontend/test-results/
          retention-days: 7

  # ============ PERFORMANCE TESTS ============
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [full-tests]
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun --config=lighthouserc.js

      - name: Run FPS performance tests
        run: npx playwright test tests/performance/ --project=chromium

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            frontend/.lighthouseci/
            frontend/test-results/
          retention-days: 7

  # ============ VISUAL REGRESSION ============
  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: [full-tests]
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual tests with Argos
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          npx playwright test tests/visual/ --project=chromium

      - name: Upload Argos screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: frontend/argos-screenshots/
          retention-days: 14

  # ============ DOCKER BUILD ============
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, nlp-checks, full-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t knowledge-graph-backend -f ./backend/Dockerfile .

      - name: Build frontend image
        run: docker build -t knowledge-graph-frontend -f ./frontend/Dockerfile .

      - name: Build NLP service image
        run: docker build -t knowledge-graph-nlp ./nlp-service

      - name: Test docker-compose
        run: docker compose config || docker-compose config
