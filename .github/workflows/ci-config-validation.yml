name: Config & Migration Validation

on:
  push:
    branches:
      - main
      - ai-agents
    paths:
      - 'knowledge-graph.config.json'
      - 'backend/migrations/**'
      - 'backend/internal/config/**'
      - '.github/workflows/ci-config-validation.yml'
  pull_request:
    branches:
      - main
      - ai-agents
    paths:
      - 'knowledge-graph.config.json'
      - 'backend/migrations/**'
      - 'backend/internal/config/**'

jobs:
  validate-config:
    name: Validate Configuration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      
      - name: Validate JSON syntax
        run: |
          cat ../knowledge-graph.config.json | jq . > /dev/null
          echo "✓ JSON syntax valid"
      
      - name: Check config loads successfully
        run: |
          go mod download
          go run cmd/checkconfig/main.go ../knowledge-graph.config.json
      
      - name: Verify all env vars documented
        run: |
          echo "Checking environment variables..."
          # Extract env var names from config.go
          grep -oP 'get[A-Za-z]+Env\("\K[^"]+' internal/config/config.go | sort | uniq > /tmp/env_vars_from_code.txt
          
          # Check if they exist in .env.example
          MISSING=0
          while read var; do
            if ! grep -q "^$var=" ../.env.example 2>/dev/null; then
              echo "⚠️  $var not found in .env.example"
              MISSING=$((MISSING + 1))
            fi
          done < /tmp/env_vars_from_code.txt
          
          if [ $MISSING -eq 0 ]; then
            echo "✓ All environment variables documented"
          else
            echo "⚠️  $MISSING environment variables missing from .env.example"
            exit 1
          fi

  check-migrations:
    name: Check Migration Drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      
      - name: Check GORM AutoMigrate compatibility
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_db?sslmode=disable
        run: |
          go mod download
          # Apply migrations via GORM AutoMigrate (using test setup)
          go test -v ./internal/infrastructure/db/postgres -run TestAutoMigrate 2>&1 || true

  validate-docker-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .env file from example
        run: |
          cp .env.example .env
          echo "✓ .env file created from .env.example"
      
      - name: Validate docker-compose.yml syntax
        run: |
          docker compose -f docker-compose.yml config > /dev/null
          echo "✓ docker-compose.yml valid"
      
      - name: Validate docker-compose.personal.yml syntax
        run: |
          docker compose -f docker-compose.personal.yml config > /dev/null
          echo "✓ docker-compose.personal.yml valid"
      
      - name: Check for conflicting env vars
        run: |
          # Check that env vars in compose files are documented
          ENV_VARS=$(grep -oP '\$\{[A-Z_]+' docker-compose*.yml | sed 's/\${//' | sort | uniq)
          MISSING=0
          for var in $ENV_VARS; do
            if ! grep -q "^$var=" .env.example 2>/dev/null; then
              echo "⚠️  $var used in docker-compose but not in .env.example"
              MISSING=$((MISSING + 1))
            fi
          done
          
          if [ $MISSING -eq 0 ]; then
            echo "✓ All Docker Compose environment variables documented"
          fi
