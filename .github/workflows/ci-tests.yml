name: Tests with Tags

on:
  push:
    branches:
      - main
      - ai-agents
  pull_request:
    branches:
      - main
      - ai-agents

jobs:
  # ============ SMOKE TESTS (PR only) ============
  smoke-tests:
    name: Smoke Tests @smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test:unit
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run smoke tests only
        run: npx playwright test --grep="@smoke" || true
      
      - name: Run smoke BDD tests
        run: npm run test:cucumber -- --tags="@smoke" || true

  # ============ FULL TEST SUITE (main merge) ============
  full-tests:
    name: Full Test Suite
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./frontend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kg_user
          POSTGRES_PASSWORD: kg_password
          POSTGRES_DB: knowledge_graph
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run all unit tests
        run: npm run test:unit
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Start backend for E2E tests
        run: |
          cd ../backend
          go mod download
          go run cmd/server/main.go &
          sleep 10
          curl http://localhost:8080/health || echo "Backend not ready"
      
      - name: Run all Playwright tests
        run: npm test
      
      - name: Run all Cucumber tests
        run: npm run test:cucumber
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-results
          path: frontend/test-results/
          retention-days: 7

  # ============ PERFORMANCE TESTS ============
  performance-tests:
    name: Performance Tests (Lighthouse + FPS)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Build frontend
        run: npm run build
      
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun --config=lighthouserc.js || echo "Lighthouse failed but continuing"
      
      - name: Run FPS performance tests
        run: npx playwright test tests/performance/ --project=chromium || true
      
      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            frontend/.lighthouseci/
            frontend/test-results/
          retention-days: 7

  # ============ VISUAL REGRESSION ============
  visual-regression:
    name: Visual Regression (Argos)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run visual tests with Argos
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: |
          npx playwright test tests/visual/ --project=chromium || true
      
      - name: Upload Argos screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: frontend/argos-screenshots/
          retention-days: 14
