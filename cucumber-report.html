window.CUCUMBER_MESSAGES = [{"meta":{"protocolVersion":"32.2.0","implementation":{"version":"12.8.1","name":"cucumber-js"},"cpu":{"name":"x64"},"os":{"name":"win32","version":"10.0.26200"},"runtime":{"name":"node.js","version":"22.13.1"}}},{"source":{"data":"Feature: Camera Position and Navigation in 3D Graph\n  As a user\n  I want the camera to be positioned correctly when viewing the 3D graph\n  So that I can see the relevant notes clearly in different modes\n\n  Background:\n    Given the application backend is running\n    And the frontend is accessible at \"http://localhost:5173\"\n\n  Scenario: Camera centers on start node in local graph view\n    Given a note \"Center Node\" exists with type \"star\"\n    And a note \"Linked Node\" exists with type \"planet\"\n    And a link exists from \"Center Node\" to \"Linked Node\"\n    When I navigate to the 3D graph page for \"Center Node\"\n    Then the graph renders within 4 seconds\n    And the camera is positioned to show \"Center Node\" in the center\n    And the camera distance allows viewing both connected nodes\n\n  Scenario: Camera shows all nodes in full 3D graph view\n    Given multiple notes of different types exist\n    And links connect some of the notes\n    When I navigate to \"/graph/3d\"\n    Then the full graph renders within 5 seconds\n    And the camera is positioned to show all visible nodes\n    And the camera target is at the center of the node cluster\n\n  Scenario: Camera adjusts when toggling between local and full graph\n    Given I am viewing the local 3D graph for a specific note\n    And the graph is fully loaded\n    When I click the \"Show all notes\" toggle\n    Then the graph switches to full graph mode\n    And the camera smoothly animates to show all nodes\n    And no node is outside the camera view\n    When I click the toggle again\n    Then the camera returns to local view positioning\n\n  Scenario: Camera maintains position on browser back/forward\n    Given I am viewing the 3D graph for a note\n    And the camera is positioned at a specific angle\n    When I navigate to the home page\n    And I click the browser back button\n    Then I return to the 3D graph page\n    And the graph renders correctly\n\n  Scenario: Transition from 2D graph to 3D graph maintains context\n    Given I am viewing the 2D graph at \"/graph\"\n    And the 2D graph shows nodes\n    When I navigate to the 3D graph for the same note\n    Then the 3D graph loads\n    And the same nodes are visible\n    And the camera shows the relevant constellation\n\n  Scenario: Camera handles empty graph gracefully\n    Given no notes exist in the system\n    When I navigate to \"/graph/3d\"\n    Then an empty state is displayed\n    And the camera does not throw errors\n    And the scene background is visible\n\n  Scenario: Camera positions correctly for isolated single node\n    Given a note \"Lonely Node\" exists with no connections\n    When I navigate to the 3D graph for \"Lonely Node\"\n    Then the graph renders the single node\n    And the camera centers on the node\n    And the node is clearly visible without other nodes blocking it\n\n  Scenario: Full 3D graph accessible from home page button\n    Given I am on the home page\n    And notes exist in the system\n    When I click the \"3D\" button in the view controls\n    Then I am navigated to \"/graph/3d\"\n    And the full 3D graph loads\n    And the camera shows all notes from an appropriate distance\n\n  Scenario: Camera zooms to fit different graph sizes\n    Given a small graph with 2-3 nodes exists\n    When I view it in 3D mode\n    Then the camera distance is appropriate for the small graph\n    Given a large graph with 20+ nodes exists\n    When I view it in 3D mode\n    Then the camera distance is increased to show all nodes\n    And no nodes are clipped by the camera frustum\n\n  Scenario: Direct URL access to 3D graph works correctly\n    Given I have the URL for a specific note's 3D graph\n    When I enter the URL directly in the browser\n    Then the 3D graph page loads\n    And the camera positions for local view\n    And the stats show \"Local view\" mode\n    Given I have the URL for the full 3D graph\n    When I enter the URL directly in the browser\n    Then the full 3D graph page loads\n    And the camera positions for full view\n    And the stats show \"Full graph\" mode\n","uri":"tests\\features\\camera_navigation.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":1,"column":1},"language":"en","keyword":"Feature","name":"Camera Position and Navigation in 3D Graph","description":"  As a user\n  I want the camera to be positioned correctly when viewing the 3D graph\n  So that I can see the relevant notes clearly in different modes","children":[{"background":{"id":"7d773177-656a-4350-9270-d49c1c8e4406","location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"id":"9ffb4809-7071-4ac8-9d46-77c702f47c18","location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the application backend is running"},{"id":"b533c748-26ed-493b-bc1e-9b3f643ae825","location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the frontend is accessible at \"http://localhost:5173\""}]}},{"scenario":{"id":"e655c980-d68e-44a9-aa42-eebed445ebf1","tags":[],"location":{"line":10,"column":3},"keyword":"Scenario","name":"Camera centers on start node in local graph view","description":"","steps":[{"id":"bf8e3254-73ac-4f96-95ad-58947c502b16","location":{"line":11,"column":5},"keyword":"Given ","keywordType":"Context","text":"a note \"Center Node\" exists with type \"star\""},{"id":"fb5424cc-1a4f-4193-9d20-c34c9d7def89","location":{"line":12,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"a note \"Linked Node\" exists with type \"planet\""},{"id":"aa383ff0-9331-48bb-94b7-09b6632efbb1","location":{"line":13,"column":5},"keyword":"And ", source":{"data":"Feature: Celestial Body Types in 3D Graph\n  As a user\n  I want to see different celestial body types rendered in the 3D graph\n  So that I can visually distinguish between different types of notes\n\n  Background:\n    Given the application backend is running\n    And the frontend is accessible at \"http://localhost:5173\"\n\n  Scenario: Star type is rendered as glowing sphere with rays\n    Given a note exists with title \"Star Note\" and type \"star\"\n    When I navigate to the 3D graph page for \"Star Note\"\n    Then the 3D graph renders a star celestial body\n    And the star has a glowing core\n    And the star has radiating rays\n\n  Scenario: Planet type is rendered as sphere with rings\n    Given a note exists with title \"Planet Note\" and type \"planet\"\n    When I navigate to the 3D graph page for \"Planet Note\"\n    Then the 3D graph renders a planet celestial body\n    And the planet has ring structures\n\n  Scenario: Comet type is rendered with tail\n    Given a note exists with title \"Comet Note\" and type \"comet\"\n    When I navigate to the 3D graph page for \"Comet Note\"\n    Then the 3D graph renders a comet celestial body\n    And the comet has a glowing tail\n\n  Scenario: Galaxy type is rendered as spiral with particles\n    Given a note exists with title \"Galaxy Note\" and type \"galaxy\"\n    When I navigate to the 3D graph page for \"Galaxy Note\"\n    Then the 3D graph renders a galaxy celestial body\n    And the galaxy has spiral arm particles\n\n  Scenario: Asteroid type is rendered as irregular rock\n    Given a note exists with title \"Asteroid Note\" and type \"asteroid\"\n    When I navigate to the 3D graph page for \"Asteroid Note\"\n    Then the 3D graph renders an asteroid celestial body\n    And the asteroid has irregular rocky surface\n\n  Scenario: Debris type is rendered as scattered particles\n    Given a note exists with title \"Debris Note\" and type \"debris\"\n    When I navigate to the 3D graph page for \"Debris Note\"\n    Then the 3D graph renders a debris field\n    And the debris consists of scattered particles\n\n  Scenario: Unknown type falls back to default sphere\n    Given a note exists with title \"Unknown Note\" and type \"unknown_type\"\n    When I navigate to the 3D graph page for \"Unknown Note\"\n    Then the 3D graph renders a default celestial body\n    And the default body is a basic sphere\n\n  Scenario: Type from metadata field is used when root type is missing\n    Given a note exists with title \"Metadata Star\" and metadata type \"star\"\n    And the note has no root type field\n    When I navigate to the 3D graph page for \"Metadata Star\"\n    Then the 3D graph renders a star celestial body\n    And the star is displayed correctly using metadata.type\n","uri":"tests\\features\\celestial_body_types.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":1,"column":1},"language":"en","keyword":"Feature","name":"Celestial Body Types in 3D Graph","description":"  As a user\n  I want to see different celestial body types rendered in the 3D graph\n  So that I can visually distinguish between different types of notes","children":[{"background":{"id":"f63c9878-1ae4-449f-ae7c-7fc3c03aa2ab","location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"id":"3a4bf9c3-1c64-41e3-a106-15b35bd80597","location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the application backend is running"},{"id":"a0b97fce-a636-45d6-bc30-e5319764964f","location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the frontend is accessible at \"http://localhost:5173\""}]}},{"scenario":{"id":"a20a4b77-e0c6-4aad-8574-099259f00995","tags":[],"location":{"line":10,"column":3},"keyword":"Scenario","name":"Star type is rendered as glowing sphere with rays","description":"","steps":[{"id":"075b7b91-b3a6-4777-b21a-ec59f3adf948","loc  specific note 3D\n    Given I am on the full 3D graph at \"/graph/3d\"\n    And a note \"Specific Note\" exists\n    When I click on node \"Specific Note\"\n    Then the side panel opens with note details\n    And I can navigate to the local 3D view for that note\n\n  Scenario: Full 3D graph handles empty database\n    Given no notes exist in the system\n    When I navigate to \"/graph/3d\"\n    Then an empty state is displayed\n    And the message prompts to create first note\n    And no errors occur\n\n  Scenario: Full 3D graph with isolated notes\n    Given notes exist with no connections between them\n    When I navigate to \"/graph/3d\"\n    Then all isolated notes are rendered\n    And each appears as separate node\n    And stats show correct node count\n    And stats show 0 links\n\n  Scenario: Full 3D graph shows fog animation on load\n    Given multiple notes exist in the system\n    When I navigate to \"/graph/3d\"\n    Then the 3D graph renders\n    And the fog effect starts dense\n    And the fog gradually dissipates as simulation ends\n    And the graph becomes fully visible\n\n  Scenario: Full 3D graph camera centers on all elements\n    Given multiple notes exist in the system\n    When I navigate to \"/graph/3d\"\n    Then the 3D graph renders\n    And the camera is positioned to show all nodes\n    And all nodes are within camera view\n    And the camera maintains minimum distance of 30 units\n\n  Scenario: Full 3D graph links persist during camera zoom\n    Given notes exist with connections between them\n    When I navigate to \"/graph/3d\"\n    Then the 3D graph renders\n    And the stats bar shows link count greater than 0\n    And I record the initial link count\n    When I zoom in on the graph\n    Then the links remain connected to their nodes\n    And the link count matches the initial recorded count\n    When I zoom out on the graph\n    Then all links are still visible and connected\n    And the link count matches the initial recorded count\n\n  Scenario: Full 3D graph links persist during camera rotation\n    Given notes exist with connections between them\n    When I navigate to \"/graph/3d\"\n    Then the 3D graph renders\n    And the stats bar shows link count greater than 0\n    When I rotate the camera 90 degrees around the graph\n    Then the links remain connected to their nodes\n    And no links are lost during rotation\n    When I rotate the camera another 90 degrees\n    Then all links are still visible and connected\n\n  Scenario: Full 3D graph shows all links correctly with many nodes\n    Given the full graph has many notes\n    And notes have various connection patterns\n    When I navigate to \"/graph/3d\"\n    Then the 3D graph renders\n    And the stats bar shows link count greater than 0\n    And no duplicate links are present in the graph\n    And all existing links remain visible without flickering\n","uri":"tests\\features\\full_3d_graph.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":1,"column":1},"language":"en","keyword":"Feature","name":"Full 3D Graph View","description":"  As a user\n  I want to view all my notes in a single 3D graph\n  So that I can see the complete structure of my knowledge base","children":[{"background":{"id":"3189b928-9215-4bc9-a269-7c83ada37bb8","location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"id":"93eb4cb8-17b5-4094-b619-c894fdc03d56","location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the application backend is running"},{"id":"94357327-496c-478a-8b4e-9144f000eab8","location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the frontend is accessible at \"http://localhost:5173\""}]}},{"scenario":{"id":"74d036b9-1176-4027-b750-94d988f2a6e5","tags":[],"location":{"line":10,"column":3},"keyword":"Scenario","name":"Navigate to full 3D graph from home page","description":"","steps":[{"i nage my notes intuitively\r\n\r\n  Background:\r\n    Given the application is open on the graph view\r\n\r\n  Scenario: Empty state prompts note creation\r\n    When there are no notes in the system\r\n    Then the graph canvas shows a message \"No notes yet\"\r\n    And a \"+\" button is visible\r\n\r\n  Scenario: Create a new note via the plus button\r\n    Given the graph view is active\r\n    When I click the \"+\" button\r\n    Then a modal with a note form appears\r\n    When I fill in \"Title\" with \"My First Note\"\r\n    And I select type \"Star\"\r\n    And I click \"Save\"\r\n    Then the modal closes\r\n    And a new node labeled \"My First Note\" appears on the graph\r\n\r\n  Scenario: Edit a note from the graph\r\n    Given a note \"My First Note\" exists on the graph\r\n    When I click on the node \"My First Note\"\r\n    Then a side panel opens showing note details\r\n    When I click \"Edit\" in the side panel\r\n    Then a modal with the note form appears pre-filled\r\n    When I change \"Title\" to \"Updated Note\"\r\n    And I click \"Save\"\r\n    Then the node label changes to \"Updated Note\"\r\n\r\n  Scenario: Delete a note with confirmation\r\n    Given a note \"To Be Deleted\" exists\r\n    When I click on the node \"To Be Deleted\"\r\n    And I click \"Delete\" in the side panel\r\n    Then a confirmation modal appears with text \"Delete note?\"\r\n    When I confirm the deletion\r\n    Then the node \"To Be Deleted\" disappears from the graph\r\n\r\n  Scenario: Create a link by dragging between nodes\r\n    Given notes \"Source\" and \"Target\" exist on the graph\r\n    When I drag from node \"Source\" to node \"Target\"\r\n    Then a link preview line is shown\r\n    When I release the mouse over \"Target\"\r\n    Then a weight selector appears\r\n    When I select weight \"4\" and confirm\r\n    Then a new edge appears between \"Source\" and \"Target\"\r\n\r\n  Scenario: Search and focus on a node\r\n    Given multiple notes exist on the graph\r\n    When I click the search icon\r\n    And I type \"cosmos\" in the search input\r\n    Then a list of matching notes appears\r\n    When I click on a search result \"Cosmos Article\"\r\n    Then the graph zooms to the node \"Cosmos Article\"\r\n    And the node is highlighted\r\n","uri":"tests\\features\\graph_navigation.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":1,"column":1},"language":"en","keyword":"Feature","name":"Graph Navigation","description":"  As a user\n  I want to interact with the knowledge graph visually\n  So that I can explore and manage my notes intuitively","children":[{"background":{"id":"469b64ed-0e7e-4514-af1c-2d5a1edfc770","location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"id":"4ce97cd4-f44e-40ca-90eb-8767435e8ef4","location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the application is open on the graph view"}]}},{"scenario":{"id":"abae478b-73e6-42ff-a89f-2b7450687cd7","tags":[],"location":{"line":9,"column":3},"keyword":"Scenario","name":"Empty state prompts note creation","description":"","steps":[{"id":"962c740c-4022-49fb-844f-9814b55832c4","location":{"line":10,"column":5},"keyword":"When ","keywordType":"Action","text":"there are no notes in the system"},{"id":"f82b9867-f580-4f95-ab62-a74eb86c32f2","location":{"line":11,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"the graph canvas shows a message \"No notes yet\""},{"id":"447c0994-3396-4b38-8238-62bd62b4ac77","location":{"line":12,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"a \"+\" button is visible"}],"examples":[]}},{"scenario":{"id":"2c030128-690f-42da-83d7-3da02c3b1bb3","tags":[],"location":{"line":14,"column":3},"keyword":"Scenario","name":"Create a new note via the plus button","description":"","steps":[{"id":"fcbb99ce-fcb0-4d95-b7f6-ff3dffa5e8d4","location":{"line":15,"column":5},"keyw ckground:\r\n    Given the application is open on the graph view\r\n    And multiple notes exist on the graph\r\n\r\n  Scenario: 2D graph is displayed by default\r\n    Given I am on the main page\r\n    Then the graph canvas shows \"2D Mode\" indicator\r\n    And nodes are rendered as 2D shapes\r\n\r\n  Scenario: Switch to 3D view\r\n    Given I am on the graph view in 2D mode\r\n    When I click the \"3D View\" button in floating controls\r\n    Then the graph switches to 3D mode\r\n    And the graph canvas shows \"3D Mode\" indicator\r\n    And nodes are rendered as 3D spheres\r\n\r\n  Scenario: Return to 2D view from 3D\r\n    Given I am on the graph view in 3D mode\r\n    When I click the \"2D View\" button\r\n    Then the graph switches back to 2D mode\r\n    And the graph canvas shows \"2D Mode\" indicator\r\n\r\n  Scenario: 3D view on low-end devices\r\n    Given I am using a low-end device\r\n    When I open the graph view\r\n    Then the graph defaults to 2D mode\r\n    And the \"3D View\" button shows a warning icon\r\n    And clicking it shows a performance warning\r\n\r\n  Scenario: Zoom and pan in 2D mode\r\n    Given I am on the graph view in 2D mode\r\n    When I scroll the mouse wheel up\r\n    Then the graph zooms in\r\n    When I scroll the mouse wheel down\r\n    Then the graph zooms out\r\n    When I drag the canvas\r\n    Then the graph pans in the dragged direction\r\n\r\n  Scenario: Rotate view in 3D mode\r\n    Given I am on the graph view in 3D mode\r\n    When I drag the mouse on the canvas\r\n    Then the camera rotates around the graph\r\n    When I use the scroll wheel\r\n    Then the camera zooms in and out\r\n\r\n  Scenario: Click node to open details in 2D\r\n    Given I am on the graph view in 2D mode\r\n    When I click on a node\r\n    Then a side panel opens showing note details\r\n    And the node is highlighted with a glow effect\r\n\r\n  Scenario: Click node to open details in 3D\r\n    Given I am on the graph view in 3D mode\r\n    When I click on a node\r\n    Then a side panel opens showing note details\r\n    And the camera centers on the clicked node\r\n","uri":"tests\\features\\graph_view.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":1,"column":1},"language":"en","keyword":"Feature","name":"Graph View Modes","description":"  As a user\n  I want to switch between 2D and 3D graph views\n  So that I can choose between performance and visual appeal","children":[{"background":{"id":"71ae8847-c961-4ec9-bf98-47619e05fd96","location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"id":"47937646-5e20-424c-b9b3-bb64c49bb32c","location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the application is open on the graph view"},{"id":"9b4d2dc1-c456-4cb3-8362-a1c3f59480f6","location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"multiple notes exist on the graph"}]}},{"scenario":{"id":"8555337a-9a2f-4231-8d9b-84cac535e408","tags":[],"location":{"line":10,"column":3},"keyword":"Scenario","name":"2D graph is displayed by default","description":"","steps":[{"id":"66055ffc-ed39-4e9d-9d83-5d7290c6f1a6","location":{"line":11,"column":5},"keyword":"Given ","keywordType":"Context","text":"I am on the main page"},{"id":"83c558c8-2be7-4e54-b199-bf6517508480","location":{"line":12,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"the graph canvas shows \"2D Mode\" indicator"},{"id":"2d45c885-1da2-4124-ab7c-48167927c1be","location":{"line":13,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"nodes are rendered as 2D shapes"}],"examples":[]}},{"scenario":{"id":"06902b58-c541-4768-9627-5ade5489a467","tags":[],"location":{"line":15,"column":3},"keyword":"Scenario","name":"Switch to 3D view","description":"","steps":[{"id":"ea42b628-1312-46da-85f5-a199b30fc404","location":{"line":16,"column":5},"keyword":"Given ","keywordType":"  a PDF file \"document.pdf\"\r\n    And I start the import\r\n    Then a progress indicator is shown\r\n    And after completion, new nodes appear on the graph\r\n\r\n  Scenario: Import from URL\r\n    Given I am on the graph view\r\n    When I open the menu and select \"Import\"\r\n    And I enter URL \"https://example.com/article\"\r\n    And I start the import\r\n    Then a progress indicator is shown\r\n    And after completion, new nodes appear on the graph\r\n\r\n  Scenario: Export to JSON\r\n    Given I have several notes on the graph\r\n    When I open the menu and select \"Export\"\r\n    And I choose format \"JSON\"\r\n    Then a file \"knowledge_graph_export.json\" is downloaded\r\n\r\n  Scenario: Export to Markdown\r\n    Given I have several notes on the graph\r\n    When I open the menu and select \"Export\"\r\n    And I choose format \"Markdown\"\r\n    Then a file \"knowledge_graph_export.md\" is downloaded\r\n\r\n  Scenario: Export to GraphML\r\n    Given I have several notes on the graph\r\n    When I open the menu and select \"Export\"\r\n    And I choose format \"GraphML\"\r\n    Then a file \"knowledge_graph_export.graphml\" is downloaded\r\n","uri":"tests\\features\\import_export.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":1,"column":1},"language":"en","keyword":"Feature","name":"Import and Export","description":"  As a user\n  I want to import external documents and export my knowledge graph","children":[{"background":{"id":"3e2de2be-864f-4b69-81e4-d3278b3c3c41","location":{"line":5,"column":3},"keyword":"Background","name":"","description":"","steps":[{"id":"7edcfc22-8cee-48c8-9a5e-43c2abac0d53","location":{"line":6,"column":5},"keyword":"Given ","keywordType":"Context","text":"the application is open on the graph view"}]}},{"scenario":{"id":"ed0d3ff0-85be-458a-9306-908d8a3b67e9","tags":[],"location":{"line":8,"column":3},"keyword":"Scenario","name":"Import from a Markdown  graph page for \"Source Note\"\n    Then the link to \"Target Note\" is visible\n    And the link has solid line style\n\n  Scenario: Dependency link is rendered with dashed line\n    Given notes \"Source Note\" and \"Target Note\" exist\n    And a link exists from \"Source Note\" to \"Target Note\" with type \"dependency\"\n    When I navigate to the 3D graph page for \"Source Note\"\n    Then the link to \"Target Note\" is visible\n    And the link has dashed line style\n\n  Scenario: Related link is rendered with dotted line\n    Given notes \"Source Note\" and \"Target Note\" exist\n    And a link exists from \"Source Note\" to \"Target Note\" with type \"related\"\n    When I navigate to the 3D graph page for \"Source Note\"\n    Then the link to \"Target Note\" is visible\n    And the link has dotted line style\n\n  Scenario: Custom link type is rendered with default styling\n    Given notes \"Source Note\" and \"Target Note\" exist\n    And a link exists from \"Source Note\" to \"Target Note\" with type \"custom_type\"\n    When I navigate to the 3D graph page for \"Source Note\"\n    Then the link to \"Target Note\" is visible\n    And the link uses default styling\n\n  Scenario: Strong link has thicker line\n    Given notes \"Source Note\" and \"Target Note\" exist\n    And a link exists from \"Source Note\" to \"Target Note\" with weight 0.9\n    When I navigate to the 3D graph page for \"Source Note\"\n    Then the link to \"Target Note\" has thick line width\n\n  Scenario: Weak link has thinner line\n    Given notes \"Source Note\" and \"Target Note\" exist\n    And a link exists from \"Source Note\" to \"Target Note\" with weight 0.2\n    When I navigate to the 3D graph page for \"Source Note\"\n    Then the link to \"Target Note\" has thin line width\n\n  Scenario: Multiple link types are visible simultaneously\n    Given note \"Hub Note\" exists\n    And note \"Reference Target\" is linked with type \"reference\"\n    And note \"Dependency Target\" is linked with type \"dependency\"\n    And note \"Related Target\" is linked with type \"related\"\n    When I navigate to the 3D graph page for \"Hub Note\"\n    Then all 3 links are visible\n    And each link has distinct visual styling\n\n  Scenario: Link connects nodes even when start node not in API response\n    Given note \"Start Node\" has no connections in API\n    But note \"Start Node\" is the center of local graph view\n    When I navigate to the 3D graph page for \"Start Node\"\n    Then the graph shows \"Start Node\" in the center\n    And stats show 1 node and 0 links\n    And no error is displayed\n","uri":"tests\\features\\link_types.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":1,"column":1},"language":"en","keyword":"Feature","name":"Link Types and Visualization","description":"  As a user\n  I want to see different types of links between notes\n  So that I can understand the nature of relationships in my knowledge graph","children":[{"background":{"id":"3bda6624-9c3a-44c4-9826-f783e0939f84","location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"id":"a39c8c8d-350b-45b5-85e2-0429c767c134","location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the application backend is running"},{"id":"327de9fe-24a5-4683-a7bd-a84c18b5fa3e","location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"multiple notes exist on the graph"}]}},{"scenario":{"id":"4a1d7b0e-b276-4b52-bb65-5363519ba8f3","tags":[],"location":{"line":10,"column":3},"keyword":"Scenario","name":"Reference link is rendered with solid line","description":"","steps":[{"id":"761a3fea-cb14-4258-a742-b8bfe225b995","location":{"line":11,"column":5},"keyword":"Given ","keywordType":"Context","text":"notes \"Source Note\" and \"Target Note\" exist"},{"id":"daacdd48-1a71-4f14-9b97-743738771665","location":{"line":12,"column":5},"keyword":"And ","  with \"Target Note\" as center\n    And the stats bar shows \"Local view\" mode\n\n  Scenario: Local 3D view shows single note with fog when no connections\n    Given a note \"Isolated Note\" exists with content \"No links\"\n    When I navigate to \"/graph/3d/{isolatedNoteId}\"\n    Then the local 3D graph renders\n    And the graph shows only \"Isolated Note\" node\n    And the fog effect starts dense\n    And the fog gradually dissipates\n    And the single node is centered in camera view\n\n  Scenario: Local 3D view with progressive loading\n    Given a note \"Hub Note\" exists with content \"Connected to many\"\n    And \"Hub Note\" has 10 related notes\n    When I navigate to \"/graph/3d/{hubNoteId}\"\n    Then the graph appears immediately without spinner\n    And the stats bar shows initial node count\n    And the fog effect is active during loading\n    When I wait for progressive loading to complete\n    Then the stats bar updates with full node count\n    And the fog gradually dissipates\n    And the camera centers on all loaded nodes\n\n  Scenario: Switch from local to full graph view using toggle\n    Given I am on the local 3D graph view for note \"Test Note\"\n    And \"Test Note\" has connections to other notes\n    When I click the \"Show all notes\" toggle\n    Then the stats bar updates to show \"Full graph\" mode\n    And the 3D graph updates to show all notes in the system\n    And the fog animation plays during transition\n    And the camera re-centers on all visible nodes\n\n  Scenario: Switch back from full to local graph view\n    Given I am on the full 3D graph at \"/graph/3d\"\n    When I navigate to \"/graph/3d/{noteId}\"\n    Then the local 3D graph renders\n    And the stats bar shows \"Local view\" mode\n    And only notes connected to the selected note are visible\n    And the camera centers on the local graph cluster\n\n  Scenario: Local 3D view camera behavior\n    Given a note \"Camera Test\" exists with 5 related notes\n    When I navigate to \"/graph/3d/{cameraTestId}\"\n    Then the 3D graph renders\n    And the camera is positioned to show all nodes in the local graph\n    And the camera maintains minimum distance of 30 units\n    And all local nodes are within camera view\n\n  Scenario: Navigate from local 3D to another note's local view\n    Given I am on the local 3D graph view for note \"Note A\"\n    And \"Note A\" is connected to \"Note B\"\n    When I click on node \"Note B\" in the 3D graph\n    Then the side panel opens with \"Note B\" details\n    When I navigate to \"/graph/3d/{noteBId}\"\n    Then the local 3D graph renders with \"Note B\" as center\n    And the stats bar shows \"Local view\" mode\n\n  Scenario: Links remain visible when switching from local to full graph\n    Given a note \"Hub Note\" exists with content \"Central node\"\n    And \"Hub Note\" has 3 related notes\n    When I navigate to \"/graph/3d/{hubNoteId}\"\n    Then the local 3D graph renders with \"Hub Note\" as center\n    And the graph shows connections to related notes\n    And the stats bar shows at least 4 nodes\n    When I click the \"Show all notes\" toggle\n    Then the stats bar updates to show \"Full graph\" mode\n    And the 3D graph renders\n    And the stats bar shows link count greater than 0\n    And all existing links remain visible without flickering\n\n  Scenario: Links persist during camera zoom operations\n    Given a note \"Zoom Test\" exists with content \"Testing zoom\"\n    And \"Zoom Test\" has 2 related notes\n    When I navigate to \"/graph/3d/{zoomTestId}\"\n    Then the local 3D graph renders with \"Zoom Test\" as center\n    And the graph shows connections to related notes\n    When I zoom in on the graph\n    Then the links remain connected to their nodes\n    And no links appear disconnected or floating\n    When I zoom out on the graph\n    Then the links still connect the same nodes\n    And the link count in stats bar remains constant\n\n  Scenario: Links persist during camera rotation\n    Given a note \"Rotate Test\" exists with content \"Testing rotation\"\n    And \"Rotate Test\" has 2 related notes\n    When I navigate to \"/graph/3d/{rotateTestId}\"\n    Then the local 3D graph renders with \"Rotate Test\" as center\n    And the graph shows connections to related notes\n    When I rotate the camera 90 degrees around the graph\n    Then the links remain connected to their nodes\n    And the links rotate with the nodes\n    And no links are lost during rotation\n    When I rotate the camera another 90 degrees\n    Then all links are still visible and connected\n\n  Scenario: Links are not duplicated when switching views multiple times\n    Given a note \"Switch Test\" exists with content \"Testing switches\"\n    And \"Switch Test\" has 2 related notes\n    When I navigate to \"/graph/3d/{switchTestId}\"\n    Then the local 3D graph renders with \"Switch Test\" as center\n    And the stats bar shows at least 3 nodes\n    And I record the initial link count\n    When I click the \"Show all notes\" toggle\n    Then the stats bar updates to show \"Full graph\" mode\n    When I click the \"Show all notes\" toggle again\n    Then the stats bar updates to show \"Local view\" mode\n    And the link count matches the initial recorded count\n    And no duplicate links are present in the graph\n\n  Scenario: Links connect correct nodes after progressive loading completes\n    Given a note \"Progressive Test\" exists with content \"Testing progressive\"\n    And \"Progressive Test\" has 5 related notes\n    When I navigate to \"/graph/3d/{progressiveTestId}\"\n    Then the local 3D graph renders with \"Progressive Test\" as center\n    And the stats bar shows initial node count\n    And I note which nodes are connected\n    When I wait for progressive loading to complete\n    Then the stats bar updates with full node count\n    And all previously noted connections remain intact\n    And new connections are properly linked to correct nodes\n","uri":"tests\\features\\local_3d_graph.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":1,"column":1},"language":"en","keyword":"Feature","name":"Local 3D Graph View","description":"  As a user\n  I want to view a specific note and its connections in 3D\n  So that I can focus on a particular part of my knowledge graph","children":[{"background":{"id":"787fb773-87ad-4c53-a1f5-daafb4c062fa","location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"id":"16b8e046-c760-4da3-bc9c-1f519977c9d3","location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the application backend is running"},{"id":"268540f9-6593-4361-b8bc-1b4fe6e67fc3","location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"the frontend is accessible at \"http://localhost:5173\""}]}},{"scenario":{"id":"5fac6981-378f-4246-bb38-64ca186c3701","tags":[],"location":{"line":10,"column":3},"keyword":"Scenario","name":"Navigate to local 3D view from note detail page","description":"","steps":[{"id":"01c139ab-ed9b-4df5-8dde-3cdcb7b481b1","location":{"line":11,"column":5},"keyword":"Given ","keywordType":"Context","text":"a note \"Central Note\" exists with content \"Main content\""},{"id":"1fa4ca04-5a4f-4c23-8a7c-f4c88b916b8c","location":{"line":12,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"note \"Central Note\" is linked to note \"Related Note 1\""},{"id":"e6fb05e2-eda0-4a18-8e1b-b7d72eb833a4","location":{"line":13,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"note \"Central Note\" is linked to note \"Related Note 2\""},{"id":"fe37eebc-e674-4351-a3ba-6bb399f3f2e4","location":{"line":14,"column":5},"keyword":"When ","keywordType":"Action","text":"I am on the note detail page for \"Central Note\""},{"id":"8fb01c03-30f5-4128-9dee-4bd056103789","location":{"line":15,"column":5},"keyword":"And ","keywordType":"Conjunctio 22-40a4-a498-31b4b8117538"]},{"id":"68593007-4251-40ab-94a7-504ab3663d29","text":"new connections are properly linked to correct nodes","type":"Outcome","astNodeIds":["d55afc8b-a6c5-40b3-a40f-ba31d3d53515"]}]}},{"source":{"data":"Feature: Note Management\r\n  As a user\r\n  I want to create, edit, and organize my notes\r\n  So that I can build my knowledge graph\r\n\r\n  Background:\r\n    Given the application is open\r\n    And I am logged in as a registered user\r\n\r\n  Scenario: Create note with wiki links\r\n    Given I am creating a new note\r\n    When I fill in \"Title\" with \"Cosmos Overview\"\r\n    And I fill in \"Content\" with \"The cosmos is vast. See also [[Galaxy Formation]].\"\r\n    And I select type \"Galaxy\"\r\n    And I click \"Save\"\r\n    Then the note is saved\r\n    And a node \"Cosmos Overview\" appears on the graph\r\n    And a link to \"Galaxy Formation\" is created if it exists\r\n\r\n  Scenario: Create note with new wiki link creates placeholder\r\n    Given I am creating a new note\r\n    When I fill in \"Content\" with \"Related to [[New Topic]]\"\r\n    And I click \"Save\"\r\n    Then the note is saved\r\n    And a placeholder node \"New Topic\" appears on the graph\r\n    And the placeholder is visually distinct (dashed border)\r\n\r\n  Scenario: Edit note content\r\n    Given a note \"Existing Note\" exists\r\n    When I open the note for editing\r\n    And I change the content to \"Updated content with [[Another Link]]\"\r\n    And I click \"Save\"\r\n    Then the note content is updated\r\n    And new links are created based on wiki syntax\r\n\r\n  Scenario: Change note type\r\n    Given a note \"My Note\" of type \"Planet\" exists\r\n    When I edit the note\r\n    And I change the type to \"Star\"\r\n    And I click \"Save\"\r\n    Then the node appearance changes to reflect the new type\r\n    And the node size increases (stars are larger than planets)\r\n\r\n  Scenario: Filter notes by type\r\n    Given notes of types \"Star\", \"Planet\", and \"Comet\" exist\r\n    When I click the \"Star\" filter button\r\n    Then only \"Star\" type nodes are visible on the graph\r\n    When I click the \"All\" filter button\r\n    Then all nodes are visible again\r\n\r\n  Scenario: Sort notes alphabetically\r\n    Given notes \"Zebra\", \"Apple\", and \"Mango\" exist\r\n    When I select sort option \"Alphabetical (A-Z)\"\r\n    Then the notes are ordered \"Apple\", \"Mango\", \"Zebra\"\r\n\r\n  Scenario: Sort notes by creation date\r\n    Given notes created on different dates exist\r\n    When I select sort option \"Newest first\"\r\n    Then the most recently created note appears first\r\n\r\n  Scenario: Batch select and delete\r\n    Given multiple notes exist on the graph\r\n    When I hold Shift and click on 3 nodes\r\n    Then the 3 nodes are selected (highlighted)\r\n    When I press Delete key\r\n    Then a confirmation modal appears\r\n    When I confirm\r\n    Then all 3 selected nodes are deleted\r\n","uri":"tests\\features\\note_management.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":1,"column":1},"language":"en","keyword":"Feature","name":"Note Management","description":"  As a user\n  I want to create, edit, and organize my notes\n  So that I can build my knowledge graph","children":[{"background":{"id":"67956f50-6cf4-4de2-a370-796f3abc68eb","location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"id":"cb28b072-a346-448b-bf89-8bf86d527ec4","location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the application is open"},{"id":"905a91d9-b933-4d72-acf0-539f4b99cd96","location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"I am logged in as a registered user"}]}},{"scenario":{"id":"54a82fdf-f9f7-470b-a3d8-c560570de1c3","tags":[],"location":{"line":10,"column":3},"keyword":"Scenario","name":"Create note with wiki links","d \r\n    When I search for \"space exploration\"\r\n    Then notes about \"rockets\", \"mars missions\", and \"astronauts\" are also found\r\n    And results are ranked by relevance score\r\n\r\n  Scenario: Empty search results\r\n    Given I search for a term with no matches\r\n    When I type \"xyznonexistent\"\r\n    Then a \"No results found\" message is displayed\r\n    And suggestions for similar terms are shown\r\n\r\n  Scenario: Search history\r\n    Given I have performed searches before\r\n    When I click on the search input\r\n    Then my recent searches are displayed\r\n    When I click on a recent search\r\n    Then the search is executed again\r\n\r\n  Scenario: Filter search results\r\n    Given I have searched for \"star\"\r\n    When I click the \"Star\" type filter\r\n    Then only \"Star\" type notes matching \"star\" are shown\r\n    When I clear the filter\r\n    Then all notes matching \"star\" are shown\r\n\r\n  Scenario: Related notes discovery\r\n    Given I am viewing a note \"Solar System\"\r\n    When I look at the side panel\r\n    Then a \"Related Notes\" section shows semantically similar notes\r\n    And related notes are sorted by similarity score\r\n\r\n  Scenario: Graph path finder\r\n    Given notes \"A\" and \"Z\" exist with multiple paths between them\r\n    When I select node \"A\" and then Shift+click node \"Z\"\r\n    Then the shortest path between \"A\" and \"Z\" is highlighted\r\n    And intermediate nodes on the path are emphasized\r\n","uri":"tests\\features\\search_and_discovery.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":1,"column":1},"language":"en","keyword":"Feature","name":"Search and Discovery","description":"  As a user\n  I want to search and discover related content\n  So that I can find relevant notes quickly","children":[{"background":{"id":"8cb55766-f2f6-46be-a2ba-f3d651f9c2af","location":{"line":6,"column":3},"keyword":"Background","name" k the \"Stars\" filter button\n    Then only star type notes are displayed in the list\n    And the stats bar shows \"filtered by: Stars\"\n    And the graph shows only star nodes\n\n  Scenario: Filter by planet type\n    Given notes of types \"star\", \"planet\", and \"comet\" exist\n    When I click the \"Planets\" filter button\n    Then only planet type notes are displayed in the list\n    And the stats bar shows \"filtered by: Planets\"\n    And the graph shows only planet nodes\n\n  Scenario: Filter by comet type\n    Given notes of types \"star\", \"planet\", and \"comet\" exist\n    When I click the \"Comets\" filter button\n    Then only comet type notes are displayed in the list\n    And the stats bar shows \"filtered by: Comets\"\n    And the graph shows only comet nodes\n\n  Scenario: Filter by galaxy type\n    Given notes of types \"star\", \"galaxy\", and \"planet\" exist\n    When I click the \"Galaxies\" filter button\n    Then only galaxy type notes are displayed in the list\n    And the stats bar shows \"filtered by: Galaxies\"\n    And the graph shows only galaxy nodes\n\n  Scenario: Clear filter by selecting All\n    Given I have applied the \"Stars\" filter\n    When I click the \"All\" filter button\n    Then all notes are displayed regardless of type\n    And the stats bar shows total count without filter indicator\n    And the graph shows all nodes\n\n  Scenario: Filter works with type in metadata field\n    Given a note exists with metadata type \"star\" but no root type\n    And the filter is currently set to \"All\"\n    When I click the \"Stars\" filter button\n    Then the note with metadata type \"star\" is included in results\n    And it is displayed in the filtered list\n\n  Scenario: Default type falls back to star when not specified\n    Given a note exists with no type field specified\n    When I click the \"Stars\" filter button\n    Then the note without type is treated as \"star\" type\n    And it appears in the filtered results\n\n  Scenario: Filter state persists when switching views\n    Given I have applied the \"Planets\" filter\n    When I switch to list view\n    Then the filter remains active\n    And only planet notes are shown in the list\n    When I switch back to graph view\n    Then the filter is still active\n    And only planet nodes are shown on the graph\n\n  Scenario: Empty state when filter matches no notes\n    Given no notes of type \"galaxy\" exist\n    When I click the \"Galaxies\" filter button\n    Then an empty state message is displayed\n    And the message indicates \"No galaxies found\"\n    And the graph shows empty state\n\n  Scenario: Combined search and type filter\n    Given notes of various types exist\n    And I have typed \"cosmos\" in the search box\n    When I click the \"Stars\" filter button\n    Then only star type notes matching \"cosmos\" are displayed\n    And both search and filter indicators are shown in stats\n","uri":"tests\\features\\type_filters.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[],"location":{"line":1,"column":1},"language":"en","keyword":"Feature","name":"Type Filtering on Home Page","description":"  As a user\n  I want to filter notes by their celestial body type\n  So that I can focus on specific categories of knowledge","children":[{"background":{"id":"5c10830f-4009-4aa4-b1f7-f3b0ddb6a015","location":{"line":6,"column":3},"keyword":"Background","name":"","description":"","steps":[{"id":"1147c282-d5cf-448a-8077-161c0687b129","location":{"line":7,"column":5},"keyword":"Given ","keywordType":"Context","text":"the application is open on the home page"},{"id":"92cfe681-3923-43d8-9027-700b674ec7a5","location":{"line":8,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"notes of various types exist in the system"}]}},{"scenario":{"id":"b9ebde82-59cd-42b6-9ded-9f8d23528b5a","tags":[],"location":{"line":10,"column":3},"keyword":"Scenario","name":"Filter by star type","des
