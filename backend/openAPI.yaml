openapi: 3.1.0
info:
  title: Knowledge Graph API
  version: 1.0.0
  description: |
    Knowledge Graph - Notes with graph links and AI recommendations.
    Notes = stars, Links = rays with weights.
    Recs = BFS graph + pgvector embeddings (α=0.7 explicit, β=0.3 semantic).

    ## Rate Limiting
    API implements token bucket rate limiting:
    - **General requests**: 100 requests per minute per IP
    - **Write operations** (POST /notes, POST /links, PUT/DELETE /notes/{id}):
      - POST /notes: 30 requests per minute
      - POST /links: 50 requests per minute  
      - PUT/DELETE /notes/{id}: 20 requests per minute

    When rate limit is exceeded, API returns `429 Too Many Requests` with error message.

servers:
  - url: http://localhost:8080

paths:
  /health:
    get:
      summary: Comprehensive health check
      description: |
        Returns health status of all service dependencies:
        - Database (PostgreSQL)
        - Cache (Redis)
        - NLP Service (Python microservice)
      responses:
        '200':
          description: All services healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: "1.0.0"
                  database:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [healthy, unhealthy]
                  redis:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [healthy, unhealthy, disabled]
                  nlp:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [healthy, unhealthy]
        '503':
          description: One or more services unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "unhealthy"
                  database:
                    type: object
                    properties:
                      status:
                        type: string
                      error:
                        type: string
                  redis:
                    type: object
                    properties:
                      status:
                        type: string
                      error:
                        type: string

  /db-check:
    get:
      summary: Database health check
      description: Check if the database connection is working
      responses:
        '200':
          description: Database is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "db ok"
        '500':
          description: Database not reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notes:
    get:
      summary: List all notes with pagination
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
          description: Maximum number of notes to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of notes to skip
      responses:
        '200':
          description: Paginated list of notes
          content:
            application/json:
              schema:
                type: object
                properties:
                  notes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'
                  total:
                    type: integer
                    description: Total count of notes
                  limit:
                    type: integer
                  offset:
                    type: integer
        '400':
          description: Bad request - invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create note (async keywords/embedding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          description: Bad request - invalid input or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notes/{id}:
    get:
      summary: Get note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update note title/content (async re-embed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          description: Bad request - invalid input or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete note + links
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notes/{id}/suggestions:
    get:
      summary: Get recommendations (graph + embeddings)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Maximum number of suggestions to return
      responses:
        '200':
          description: Suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Suggestion'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notes/{id}/graph:
    get:
      summary: Graph data for note (nodes/links BFS depth 3)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Graph JSON for d3-force
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphData'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notes/search:
    get:
      summary: Search notes by query
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Maximum number of results
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Offset for pagination
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  notes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Note'
                  total:
                    type: integer
                    description: Total count of matching notes
        '400':
          description: Bad request - missing query parameter
  /graph/all:
    get:
      summary: Get entire graph structure with pagination
      description: |
        Returns nodes and links for full graph visualization with pagination support.
        Separate pagination for notes and links to optimize large graph loading.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 0
            maximum: 1000
          description: Maximum number of notes to return (0 = all, max 1000)
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of notes to skip for pagination
        - name: link_limit
          in: query
          schema:
            type: integer
            default: 500
            minimum: 0
            maximum: 5000
          description: Maximum number of links to return (0 = all, max 5000)
        - name: link_offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of links to skip for pagination
      responses:
        '200':
          description: Complete graph data with pagination metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      $ref: '#/components/schemas/GraphNode'
                  links:
                    type: array
                    items:
                      $ref: '#/components/schemas/GraphLink'
                  pagination:
                    type: object
                    properties:
                      notes:
                        type: object
                        properties:
                          total:
                            type: integer
                            description: Total count of notes in database
                          limit:
                            type: integer
                          offset:
                            type: integer
                      links:
                        type: object
                        properties:
                          total:
                            type: integer
                            description: Total count of links in database
                          limit:
                            type: integer
                          offset:
                            type: integer
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Rate limit exceeded. Please try again later."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /links:
    post:
      summary: Create link (explicit relation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkRequest'
      responses:
        '201':
          description: Link created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '400':
          description: Bad request - invalid input or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Source or target note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /links/{id}:
    get:
      summary: Get link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          description: Link not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
        '404':
          description: Link not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /notes/{id}/links:
    get:
      summary: Get links for note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Link'
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete all links for note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: All links deleted
        '404':
          description: Note not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Note:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        keywords:
          type: array
          items:
            type: string
        embedding:
          type: array
          items:
            type: number
            format: float
        type:
          type: string
          description: "Категория контента (book, movie, anime, manga, adaptation и др.)"
        metadata:
          type: object
          additionalProperties: true
          description: "Дополнительные метаданные (например, celestial_type для визуализации графа)"

    CreateNoteRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          type: string
          description: "Категория заметки"
        metadata:
          type: object
          additionalProperties: true
      required:
        - title

    UpdateNoteRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        type:
          type: string
        metadata:
          type: object
          additionalProperties: true

    Link:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the link
        source_note_id:
          type: string
          format: uuid
          description: ID of the source note
        target_note_id:
          type: string
          format: uuid
          description: ID of the target note
        weight:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Link weight from 0.0 to 1.0
        link_type:
          type: string
          enum: [reference, dependency, related, custom]
          description: Type of relationship between notes
        description:
          type: string
          description: Optional human-readable description of the link
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateLinkRequest:
      type: object
      properties:
        source_note_id:
          type: string
          format: uuid
          description: ID of the source note
        target_note_id:
          type: string
          format: uuid
          description: ID of the target note
        weight:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.5
          description: Link weight (0.0 to 1.0)
        link_type:
          type: string
          enum: [reference, dependency, related, custom]
          default: reference
          description: Type of relationship
        description:
          type: string
          description: Optional human-readable description
      required:
        - source_note_id
        - target_note_id

    Suggestion:
      type: object
      properties:
        note_id:
          type: string
        title:
          type: string
        score:
          type: number
          format: float

    GraphNode:
      type: object
      description: Node representing a note in the graph visualization
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the note
        title:
          type: string
          description: Title of the note
        type:
          type: string
          enum: [star, planet, comet, galaxy]
          description: "Celestial body type for visualization (from metadata.celestial_type)"

    GraphLink:
      type: object
      description: Link representing a connection between notes
      properties:
        source:
          type: string
          format: uuid
          description: ID of the source note
        target:
          type: string
          format: uuid
          description: ID of the target note
        weight:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Connection strength (0.0 to 1.0)
        link_type:
          type: string
          enum: [reference, dependency, related, custom]
          description: Type of relationship

    GraphData:
      type: object
      description: Graph data structure for D3.js force visualization
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphNode'
        links:
          type: array
          items:
            $ref: '#/components/schemas/GraphLink'

    Error:
      type: object
      description: Standard error response
      properties:
        error:
          type: string
          description: Error type/code
          example: "not_found"
        message:
          type: string
          description: Human-readable error description
          example: "Note with ID 'abc-123' not found"
        detail:
          type: string
          description: Detailed error information (optional)
          example: "The requested resource does not exist in the database"
        code:
          type: integer
          description: HTTP status code
          example: 404
      required:
        - error
        - message

tags:
  - name: Health
    description: Health check and system status
  - name: Notes
    description: Note management operations
  - name: Links
    description: Link/relationship management
  - name: Graph
    description: Graph visualization and traversal
  - name: Search
    description: Search and discovery operations