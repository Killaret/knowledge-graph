sible\n\n  @regression\n  Scenario: Create note from floating controls\n    Given I am on the main page\n    When I click the \"+\" button in floating controls\n    Then a create note modal should open\n    When I fill in the title \"Test Note\"\n    And I select type \"Star\"\n    And I click the \"Create\" button\n    Then the modal should close\n    And the new note should appear in the graph\n","uri":"tests\\features\\graph_2d_list.feature","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"feature":{"tags":[{"location":{"line":1,"column":1},"name":"@smoke","id":"5629e05e-d5a1-4c97-b120-4d25fc8ebdec"},{"location":{"line":1,"column":8},"name":"@2d-graph","id":"3d206790-92e0-4831-850e-4378f132275e"},{"location":{"line":1,"column":18},"name":"@list-view","id":"f2fb8b5d-c727-43b4-9f9b-e8e7e12a2d6c"}],"location":{"line":2,"column":1},"language":"en","keyword":"Feature","name":"2D Graph and List View","description":"  As a user\n  I want to toggle between graph and list views\n  So that I can explore notes in different ways","children":[{"background":{"id":"535c3ba1-d6f1-48b5-b4c2-49573fd12e98","location":{"line":7,"column":3},"keyword":"Background","name":"","description":"","steps":[{"id":"a72615fd-a47a-4e32-ae11-d027605186a9","location":{"line":8,"column":5},"keyword":"Given ","keywordType":"Context","text":"I am on the main page \"/\""},{"id":"32bf77c3-0a8f-43cd-b736-6591a3f1f9b4","location":{"line":9,"column":5},"keyword":"And ","keywordType":"Conjunction","text":"there are notes of various types in the database"}]}},{"scenario":{"id":"2e1f1e93-e637-45e0-9126-e7ee57c8b2c7","tags":[{"location":{"line":11,"column":3},"name":"@regression","id":"60a0fcec-baaa-44c8-baf5-4b2b192ef38e"}],"location":{"line":12,"column":3},"keyword":"Scenario","name":"Toggle between graph and list views","description":"","steps":[{"id":"41a8f107-d681-421f-8231-d99be1cb39f1","location":{"line":13,"column":5},"keyword":"Then ","keywordType":"Outcome","text":"I should see the
