services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kg-postgres
    environment:
      POSTGRES_USER: kb_user
      POSTGRES_PASSWORD: kb_password
      POSTGRES_DB: knowledge_base
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_user -d knowledge_base"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: kg-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nlp:
    build: ./nlp-service
    container_name: kg-nlp
    ports:
      - "5000:5000"
    environment:
    - MODEL_NAME=all-MiniLM-L6-V2
    - HF_ENDPOINT=https://hf-mirror.com
    - SENTENCE_TRANSFORMERS_HOME=/root/.cache/torch/sentence_transformers   # важно!
    volumes:
    - ./huggingface_cache:/root/.cache/torch/sentence_transformers
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 600s
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: kg-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://kb_user:kb_password@postgres:5432/knowledge_base?sslmode=disable
      REDIS_URL: redis:6379
      NLP_SERVICE_URL: http://nlp:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nlp:
        condition: service_started
    restart: on-failure
  worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: kg-worker
    command: ["./worker"]
    environment:
      DATABASE_URL: postgresql://kb_user:kb_password@postgres:5432/knowledge_base?sslmode=disable
      REDIS_URL: redis:6379
      NLP_SERVICE_URL: http://nlp:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nlp:
        condition: service_started
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        # В Docker сети backend доступен по имени сервиса
        VITE_API_TARGET: http://backend:8080
    container_name: kg-frontend
    ports:
      - "3000:3000"
    environment:
      # For local Docker: use localhost. In production, use public URL or nginx proxy
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres_data: