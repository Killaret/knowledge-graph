services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kg-postgres
    environment:
      POSTGRES_USER: kb_user
      POSTGRES_PASSWORD: kb_password
      POSTGRES_DB: knowledge_base
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_user -d knowledge_base"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: kg-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nlp:
    build: ./nlp-service
    container_name: kg-nlp
    ports:
      - "5000:5000"
    environment:
    - MODEL_NAME=all-MiniLM-L6-V2
    - HF_ENDPOINT=https://hf-mirror.com
    - SENTENCE_TRANSFORMERS_HOME=/root/.cache/torch/sentence_transformers   # важно!
    volumes:
    - ./huggingface_cache:/root/.cache/torch/sentence_transformers
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    restart: always

  backend:
    build: ./backend
    container_name: kg-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://kb_user:kb_password@postgres:5432/knowledge_base?sslmode=disable
      REDIS_URL: redis:6379
      NLP_SERVICE_URL: http://nlp:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nlp:
        condition: service_healthy
    restart: on-failure
  worker:
    build: ./backend
    container_name: kg-worker
    command: ["./worker"]
    environment:
      DATABASE_URL: postgresql://kb_user:kb_password@postgres:5432/knowledge_base?sslmode=disable
      REDIS_URL: redis:6379
      NLP_SERVICE_URL: http://nlp:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nlp:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data: